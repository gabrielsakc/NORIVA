// ═══ DONUT PIE ═══
function Pie({ data, size = 120, thick = 22 }) {
  const t = useT();
  const total = data.reduce((a, d) => a + d.v, 0);
  if (!total) return <div className="empty">{t("no_data")}</div>;
  const r = size / 2 - 3, ri = r - thick, cx = size / 2, cy = size / 2;
  let ang = -Math.PI / 2;
  const arcs = data.filter(d => d.v > 0).map((d, i) => {
    const pct = d.v / total, a1 = ang, a2 = ang + pct * Math.PI * 2;
    ang = a2;
    if (pct >= 0.999) return <g key={i}><circle cx={cx} cy={cy} r={r} fill={d.c} /><circle cx={cx} cy={cy} r={ri} fill="var(--bg2)" /></g>;
    const lg = pct > 0.5 ? 1 : 0;
    const p = `M ${cx+r*Math.cos(a1)} ${cy+r*Math.sin(a1)} A ${r} ${r} 0 ${lg} 1 ${cx+r*Math.cos(a2-.001)} ${cy+r*Math.sin(a2-.001)} L ${cx+ri*Math.cos(a2-.001)} ${cy+ri*Math.sin(a2-.001)} A ${ri} ${ri} 0 ${lg} 0 ${cx+ri*Math.cos(a1)} ${cy+ri*Math.sin(a1)} Z`;
    return <path key={i} d={p} fill={d.c} />;
  });
  return (
    <div className="pie-w">
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {arcs}
        <text x={cx} y={cy - 2} textAnchor="middle" fill="var(--tx)" fontFamily="JetBrains Mono" fontWeight="700" fontSize="14">{total}</text>
        <text x={cx} y={cy + 10} textAnchor="middle" fill="var(--tx3)" fontFamily="DM Sans" fontWeight="500" fontSize="8">TOTAL</text>
      </svg>
      <div className="pie-lg">{data.filter(d => d.v > 0).map(d => (
        <div className="pie-i" key={d.n}><span className="pie-dt" style={{ background: d.c }} /><span>{d.n}</span><span className="pie-v">{d.v > 999 ? fm(d.v) : d.v}</span></div>
      ))}</div>
    </div>
  );
}

// ═══ FIELD INPUT ═══
function Fld({ label, value, onChange, type = "text", options, placeholder, onKeyDown }) {
  let el;
  if (type === "select") el = <select className="ipt" value={value || ""} onChange={e => onChange(e.target.value)}>{options.map(o => typeof o === "string" ? <option key={o} value={o}>{o}</option> : <option key={o.v} value={o.v}>{o.t}</option>)}</select>;
  else if (type === "textarea") el = <textarea className="ipt" style={{ minHeight: 26, height: 26, resize: "none" }} value={value || ""} placeholder={placeholder} onChange={e => onChange(e.target.value)} />;
  else el = <input className="ipt" type={type} value={value == null ? "" : value} placeholder={placeholder} onChange={e => onChange(type === "number" ? Number(e.target.value) : e.target.value)} onKeyDown={onKeyDown} />;
  return <div className="ig"><label>{label}</label>{el}</div>;
}

function Dashboard({ data }) {
  const { leads, opportunities, tasks, tickets, invoices, transactions, stages, accounts } = data;
  const opp = opportunities.filter(o => { const s = stages.find(st => st.id === o.stage_id); return s && !s.is_won && !s.is_lost; });
  const totalPipe = opp.reduce((a, o) => a + (+o.amount || 0), 0);
  const won = opportunities.filter(o => { const s = stages.find(st => st.id === o.stage_id); return s?.is_won; });
  const totalWon = won.reduce((a, o) => a + (+o.amount || 0), 0);
  const tI = transactions.filter(t => t.type === "income").reduce((a, t) => a + (+t.amount || 0), 0);
  const tE = transactions.filter(t => t.type === "expense").reduce((a, t) => a + (+t.amount || 0), 0);
  const pendTasks = tasks.filter(t => t.status === "pending").length;
  const openTickets = tickets.filter(t => t.status === "open" || t.status === "in_progress").length;

  const stageData = stages.filter(s => !s.is_won && !s.is_lost).map(s => ({
    n: s.name, v: opportunities.filter(o => o.stage_id === s.id).reduce((a, o) => a + (+o.amount || 0), 0), c: s.color
  }));
  const mx = Math.max(...stageData.map(s => s.v), 1);

  const pieLeadSrc = {};
  leads.forEach(l => { const s = l.source || "other"; pieLeadSrc[s] = (pieLeadSrc[s] || 0) + 1; });
  const srcC = ["#f97316", "#2563eb", "#9ca3af", "#059669", "#7c3aed", "#0891b2", "#dc2626", "#d97706"];
  const pieSrc = Object.entries(pieLeadSrc).map(([k, v], i) => ({ n: k, v, c: srcC[i % srcC.length] }));

  const pieTickets = [
    { n: "Abiertos", v: tickets.filter(t => t.status === "open").length, c: "#f97316" },
    { n: "En Progreso", v: tickets.filter(t => t.status === "in_progress").length, c: "#2563eb" },
    { n: "Resueltos", v: tickets.filter(t => t.status === "resolved" || t.status === "closed").length, c: "#059669" },

  return (
    <div className="fin">
      <div className="grid4">
        <div className="card"><div className="card-lb">Embudo Activo</div><div className="card-vl" style={{ color: "var(--acc)" }}>{fm(totalPipe)}</div><div className="card-sub">{opp.length} oportunidades</div></div>
        <div className="card"><div className="card-lb">Negocios Ganados</div><div className="card-vl" style={{ color: "var(--grn)" }}>{fm(totalWon)}</div><div className="card-sub">{won.length} contratos</div></div>
        <div className="card"><div className="card-lb">Balance Neto</div><div className="card-vl" style={{ color: tI - tE >= 0 ? "var(--grn)" : "var(--red)" }}>{fm(tI - tE)}</div><div className="card-sub">Ingresos − Egresos</div></div>
        <div className="card"><div className="card-lb">Leads Activos</div><div className="card-vl" style={{ color: "var(--ora)" }}>{leads.filter(l => !["converted", "lost"].includes(l.status)).length}</div><div className="card-sub">{leads.length} totales</div></div>
      </div>
      <div className="grid4">
        <div className="card"><div className="card-lb">Tareas Pendientes</div><div className="card-vl" style={{ color: "var(--amb)" }}>{pendTasks}</div><div className="card-sub">de {tasks.length} totales</div></div>

        <div className="card"><div className="card-lb">Facturas Pendientes</div><div className="card-vl" style={{ color: "var(--red)" }}>{fm(invoices.filter(i => i.status !== "paid" && i.status !== "cancelled").reduce((a, i) => a + (+i.total || 0), 0))}</div><div className="card-sub">{invoices.filter(i => i.status !== "paid").length} sin cobrar</div></div>

// ═══ GENERIC LIST MODULE ═══
function ListModule({ title, table, columns, formFields, data, reload, emptyMsg, formatRow, newDefaults = {}, extraActions, filterOptions, topButtons }) {
  const t = useT();
  const [search, setSearch] = useState("");
  const [modal, setModal] = useState(false);
  const [ed, setEd] = useState(null);
  const [saving, setSaving] = useState(false);
  const [filter, setFilter] = useState("all");

  const filtered = data.filter(item => {
    if (!search && filter === "all") return true;
    const s = search.toLowerCase();
    const matchSearch = !search || columns.some(c => String(item[c.key] || "").toLowerCase().includes(s));
    const matchFilter = filter === "all" || (filterOptions && item[filterOptions.key] === filter);
    return matchSearch && matchFilter;
  });

  const openNew = () => { setEd({ ...newDefaults }); setModal(true); };
  const openEdit = (item) => { setEd({ ...item }); setModal(true); };
  const save = () => {
    if (saving) return;
    setSaving(true);
    const payload = {};
    formFields.forEach(f => { if (f.key) payload[f.key] = ed[f.key] ?? null; });
    const prom = ed.id ? api.patch(table, ed.id, payload) : api.post(table, payload);
    prom.then(() => { setModal(false); setSaving(false); reload(); }).catch(() => setSaving(false));
  };
  const remove = (id) => { api.del(table, id).then(reload); };

  return (
    <div className="fin">
      <div style={{ display: "flex", gap: 8, marginBottom: 12, alignItems: "center", flexWrap: "wrap" }}>
        <div className="srch"><Ic name="search" size={13} color="var(--tx3)" /><input placeholder={t("search")} value={search} onChange={e => setSearch(e.target.value)} /></div>
        {filterOptions && <select className="ipt" style={{ width: "auto" }} value={filter} onChange={e => setFilter(e.target.value)}><option value="all">{t("all")}</option>{filterOptions.values.map(o => <option key={o.v} value={o.v}>{o.t}</option>)}</select>}
        <div style={{ flex: 1 }} />
        {topButtons}
        <button className="btn btn-s btn-sm" style={{ fontSize: 9 }} onClick={() => {
          const headers = columns.map(c => c.label);
          const rows = filtered.map(item => columns.map(c => String(item[c.key] || "—")));
          exportCSV(`platinum_${table}_${new Date().toISOString().slice(0,10)}.csv`, headers, rows);
        }}>⬇ CSV</button>
        <button className="btn btn-p" onClick={openNew}><Ic name="add" size={13} /> {t("new")}</button>
      </div>
      <div className="tbl">
        {filtered.length ? (
          <table>
            <thead><tr>{columns.map(c => <th key={c.key}>{c.label}</th>)}<th>{t("actions")}</th></tr></thead>
            <tbody>{filtered.map(item => (
              <tr key={item.id}>
                {columns.map(c => <td key={c.key}>{formatRow ? formatRow(item, c.key) : (c.render ? c.render(item[c.key], item) : String(item[c.key] || "—"))}</td>)}
                <td style={{ whiteSpace: "nowrap" }}>
                  {extraActions && extraActions(item)}
                  <button className="btn btn-s btn-sm" onClick={() => openEdit(item)}>{t("edit")}</button>
                </td>
              </tr>
            ))}</tbody>
          </table>
        ) : <div className="empty">{emptyMsg || t("no_records")}</div>}
      </div>
      {modal && ed && (
        <Modal title={ed.id ? `${t("edit")} ${title}` : `${t("new")} ${title}`} onClose={() => setModal(false)} footer={<>
          {ed.id && <button className="btn btn-d" style={{ marginRight: "auto" }} onClick={() => { remove(ed.id); setModal(false); }}>{t("delete")}</button>}
          <button className="btn btn-s" onClick={() => setModal(false)}>{t("cancel")}</button>
          <button className="btn btn-p" onClick={save} disabled={saving}>{saving ? t("saving") : t("save")}</button>
        </>}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 4 }}>
            {formFields.map(f => (
              <div key={f.key} style={f.span ? { gridColumn: `span ${f.span}` } : {}}>
                <Fld label={f.label} type={f.type || "text"} value={ed[f.key]} options={f.options} placeholder={f.placeholder}
                  onChange={v => setEd({ ...ed, [f.key]: v })} />
              </div>
            ))}
          </div>
        </Modal>
      )}
    </div>
  );
}

// ═══ AUTO SCORE LEAD ═══
function calcLeadScore(lead) {
  let score = 0;
  if (lead.company) score += 15;
  if (lead.contact_name) score += 10;
  if (lead.email) score += 15;
  if (lead.phone) score += 10;
  if ((+lead.estimated_value || 0) > 0) score += 10;
  if ((+lead.estimated_value || 0) >= 50000) score += 10;
  if ((+lead.estimated_value || 0) >= 200000) score += 5;
  if (lead.industry) score += 5;
  if (lead.source === "referral" || lead.source === "partner") score += 10;
  else if (lead.source === "web" || lead.source === "linkedin") score += 5;
  if (lead.status === "contacted") score += 5;
  if (lead.status === "qualified") score += 10;
  return Math.min(score, 100);
}

function canAccess(role, viewId) {
  const allowed = ROLE_NAV[role];
  if (!allowed) return true;
  return allowed.includes(viewId);
}

// Filtra filas según rol: admin/finance ven todo,
// manager filtra por región, sales_rep/support por owner
function filterByRole(rows, role, userId, region) {
  if (!Array.isArray(rows)) return [];
  if (role === "admin" || role === "finance") return rows;
  if (role === "manager") {
    return rows.filter(r =>
      !r.region || r.region === region ||
      r.owner_id === userId || r.assigned_to === userId ||
      r.created_by === userId || r.author_id === userId || r.requested_by === userId
    );
  }
  // sales_rep / support
  return rows.filter(r =>
    r.owner_id === userId || r.assigned_to === userId ||
    r.created_by === userId || r.author_id === userId || r.requested_by === userId
  );
}

// ═══ CSV EXPORT ═══
function exportCSV(filename, headers, rows) {
  const bom = "\uFEFF";
  const csv = bom + headers.join(",") + "\n" + rows.map(r => r.map(c => `"${String(c || "").replace(/"/g, '""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function AIAssistant({ data, user }) {
  const [prompt, setPrompt] = useState("");
  const [response, setResponse] = useState("");
  const [loading, setLoading] = useState(false);
  const [history, setHistory] = useState([]);

  const buildContext = () => {
    const stats = {
      leads: data.leads.length,
      leadsActive: data.leads.filter(l => !["converted", "lost"].includes(l.status)).length,
      accounts: data.accounts.length,
      contacts: data.contacts.length,
      opportunities: data.opportunities.length,
      pipelineValue: data.opportunities.filter(o => { const s = data.stages.find(st => st.id === o.stage_id); return s && !s.is_won && !s.is_lost; }).reduce((a, o) => a + (+o.amount || 0), 0),
      wonDeals: data.opportunities.filter(o => { const s = data.stages.find(st => st.id === o.stage_id); return s?.is_won; }).length,
      wonValue: data.opportunities.filter(o => { const s = data.stages.find(st => st.id === o.stage_id); return s?.is_won; }).reduce((a, o) => a + (+o.amount || 0), 0),
      openTickets: data.tickets.filter(t => t.status === "open" || t.status === "in_progress").length,
      pendingTasks: data.tasks.filter(t => t.status === "pending").length,
      income: data.transactions.filter(t => t.type === "income").reduce((a, t) => a + (+t.amount || 0), 0),
      expenses: data.transactions.filter(t => t.type === "expense").reduce((a, t) => a + (+t.amount || 0), 0),
    };
    const topAccounts = data.accounts.slice(0, 5).map(a => `${a.name} (${a.type}, health:${a.health_score}%)`).join("; ");
    const topOpps = data.opportunities.slice(0, 5).map(o => { const s = data.stages.find(st => st.id === o.stage_id); return `${o.name} ($${o.amount}, ${s?.name || "?"})`; }).join("; ");
    const recentLeads = data.leads.slice(0, 5).map(l => `${l.company || "?"} (${l.status}, score:${l.score})`).join("; ");

    return `Sos el asistente de IA de Platinum CRM, empresa de ciberseguridad. Usuario: ${user.name} (${user.role}).
DATOS ACTUALES:
- ${stats.leads} leads (${stats.leadsActive} activos)
- ${stats.accounts} cuentas, ${stats.contacts} contactos
- ${stats.opportunities} oportunidades, pipeline: $${stats.pipelineValue.toLocaleString()}
- ${stats.wonDeals} deals ganados por $${stats.wonValue.toLocaleString()}
- ${stats.openTickets} tickets abiertos, ${stats.pendingTasks} tareas pendientes
- Ingresos: $${stats.income.toLocaleString()}, Egresos: $${stats.expenses.toLocaleString()}
Top cuentas: ${topAccounts || "ninguna"}
Top oportunidades: ${topOpps || "ninguna"}
Leads recientes: ${recentLeads || "ninguno"}
Respondé en español, sé conciso y da recomendaciones accionables.`;
  };

  const askAI = async () => {
    if (!prompt.trim() || loading) return;
    setLoading(true);
    setResponse("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: buildContext(),
          messages: [...history, { role: "user", content: prompt }],
        }),
      });
      const json = await res.json();
      const text = json.content?.map(c => c.text || "").join("") || "Sin respuesta";
      setResponse(text);
      setHistory(h => [...h, { role: "user", content: prompt }, { role: "assistant", content: text }].slice(-10));
      setPrompt("");
    } catch (err) {
      setResponse("Error: " + err.message);
    }
    setLoading(false);
  };

  const quickActions = [
    { label: "📊 Resumen ejecutivo", prompt: "Dame un resumen ejecutivo del estado actual del CRM con métricas clave y recomendaciones" },
    { label: "🎯 Próximas acciones", prompt: "¿Cuáles son las 5 acciones más importantes que debería tomar hoy basándote en los datos del CRM?" },

    { label: "📈 Tips de ventas", prompt: "Dame recomendaciones para mejorar la conversión del pipeline y cerrar más deals" },
    { label: "✉️ Email de seguimiento", prompt: "Redactá un email de seguimiento comercial profesional para un lead de ciberseguridad" },
    { label: "📋 Propuesta comercial", prompt: "Ayudame a redactar una propuesta comercial de servicios de ciberseguridad para una empresa enterprise" },
  ];

  return (
    <div className="fin">
      <div className="grid2" style={{ marginBottom: 16 }}>
        <div className="card">
          <div className="card-lb" style={{ marginBottom: 8 }}>Acciones Rápidas</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {quickActions.map(qa => (
              <button key={qa.label} className="btn btn-s btn-sm" style={{ fontSize: 10 }}
                onClick={() => { setPrompt(qa.prompt); }}>{qa.label}</button>
            ))}
          </div>
        </div>
        <div className="card">
          <div className="card-lb" style={{ marginBottom: 4 }}>Contexto IA</div>
          <div style={{ fontSize: 10, color: "var(--tx3)" }}>
            El asistente tiene acceso a todos tus datos del CRM en tiempo real: {data.leads.length} leads, {data.accounts.length} cuentas, {data.opportunities.length} oportunidades, {data.tickets.length} tickets, {data.tasks.length} tareas.
          </div>
        </div>
      </div>
      <div className="card">
        <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
          <input className="ipt" style={{ flex: 1 }} value={prompt} placeholder="Preguntale algo al asistente IA..." 
            onChange={e => setPrompt(e.target.value)} 
            onKeyDown={e => { if (e.key === "Enter") askAI(); }} />
          <button className="btn btn-p" onClick={askAI} disabled={loading}>{loading ? "Pensando..." : "Enviar"}</button>
        </div>
        {response && (
          <div style={{ background: "var(--bg3)", borderRadius: 8, padding: 12, fontSize: 12, lineHeight: 1.6, color: "var(--tx)", whiteSpace: "pre-wrap", maxHeight: 400, overflowY: "auto" }}>
            {response}
          </div>
        )}
        {history.length > 0 && !response && (
          <div style={{ maxHeight: 300, overflowY: "auto" }}>
            {history.map((h, i) => (
              <div key={i} style={{ padding: "6px 0", borderBottom: "1px solid var(--bdr)", fontSize: 11 }}>
                <span style={{ fontWeight: 700, color: h.role === "user" ? "var(--ora)" : "var(--acc)" }}>{h.role === "user" ? "Tú" : "IA"}:</span>{" "}
                <span style={{ color: "var(--tx2)" }}>{h.content.slice(0, 150)}{h.content.length > 150 ? "..." : ""}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

  const [data, setData] = useState({ leads: [], contacts: [], accounts: [], opportunities: [], stages: [], tasks: [], products: [], quotes: [], tickets: [], invoices: [], transactions: [], events: [], goals: [], forecasts: [], conversations: [], activities: [], kb_articles: [], teams: [], territories: [], automations: [], surveys: [], orders: [], sla_policies: [], escalations: [], approvals: [] });

  const loadAll = useCallback(() => {
    if (!user) return;
    setLoading(true);
    const role   = user.role   || "sales_rep";
    const uid    = user.id;
    const region = user.region || "";
    const f = (rows) => filterByRole(rows || [], role, uid, region);
    // Tablas globales (sin filtro por owner): stages, products, sla_policies, territories, teams, automations
    Promise.all([
      api.get("crm_leads",          "&order=created_at.desc"),
      api.get("crm_contacts",        "&order=created_at.desc"),
      api.get("crm_accounts",        "&order=created_at.desc"),
      api.get("crm_opportunities",   "&order=created_at.desc"),
      api.get("crm_pipeline_stages", "&order=order_num.asc"),
      api.get("crm_tasks",           "&order=created_at.desc"),
      api.get("crm_products",        "&order=name.asc"),
      api.get("crm_quotes",          "&order=created_at.desc"),
      api.get("crm_tickets",         "&order=created_at.desc"),
      api.get("crm_invoices",        "&order=created_at.desc"),
      api.get("crm_transactions",    "&order=created_at.desc"),
      api.get("crm_events",          "&order=start_at.desc"),
      api.get("crm_goals",           "&order=created_at.desc"),
      api.get("crm_forecasts",       "&order=created_at.desc"),
      api.get("crm_conversations",   "&order=created_at.desc"),
      api.get("crm_activities",      "&order=created_at.desc"),
      api.get("crm_kb_articles",     "&order=created_at.desc"),
      api.get("crm_teams",           "&order=created_at.desc"),
      api.get("crm_territories",     "&order=created_at.desc"),
      api.get("crm_automations",     "&order=created_at.desc"),
      api.get("crm_surveys",         "&order=created_at.desc"),
      api.get("crm_orders",          "&order=created_at.desc"),
      api.get("crm_sla_policies",    "&order=priority.asc"),
      api.get("crm_escalations",     "&order=created_at.desc"),
      api.get("crm_approvals",       "&order=created_at.desc"),
    ]).then(([leads, contacts, accounts, opportunities, stages, tasks, products, quotes, tickets, invoices, transactions, events, goals, forecasts, conversations, activities, kb_articles, teams, territories, automations, surveys, orders, sla_policies, escalations, approvals]) => {
      setData({
        // Datos filtrados por rol
        leads:         f(leads),
        contacts:      f(contacts),
        accounts:      f(accounts),
        opportunities: f(opportunities),
        tasks:         f(tasks),
        quotes:        f(quotes),
        tickets:       f(tickets),
        invoices:      f(invoices),
        transactions:  f(transactions),
        events:        f(events),
        goals:         f(goals),
        forecasts:     f(forecasts),
        conversations: f(conversations),
        activities:    f(activities),
        orders:        f(orders),
        escalations:   f(escalations),
        approvals:     f(approvals),
        surveys:       f(surveys),
        // Datos globales (sin filtro de rol — todos ven igual)
        stages:        stages      || [],
        products:      products    || [],
        kb_articles:   kb_articles || [],
        teams:         teams       || [],
        territories:   territories || [],
        automations:   automations || [],
        sla_policies:  sla_policies|| [],
      });
      setLoading(false);
    }).catch(() => setLoading(false));
  }, [user]);

  useEffect(() => { if (user) loadAll(); }, [user, loadAll]);

  if (!user) return <><style>{css}</style><Login onLogin={setUser} /></>;

  const accOpts = [{ v: "", t: "— Ninguna —" }, ...data.accounts.map(a => ({ v: a.id, t: a.name }))];
  const ctcOpts = [{ v: "", t: "— Ninguno —" }, ...data.contacts.map(c => ({ v: c.id, t: `${c.first_name} ${c.last_name || ""}` }))];
  const stgOpts = data.stages.map(s => ({ v: s.id, t: s.name }));
  const prodOpts = [{ v: "", t: "— Ninguno —" }, ...data.products.map(p => ({ v: p.id, t: p.name }))];
  const oppOpts = [{ v: "", t: "— Ninguna —" }, ...data.opportunities.map(o => ({ v: o.id, t: o.name }))];

  // ═══ WORKFLOW: Convert Lead → Account + Contact + Opportunity ═══
  const convertLead = async (lead) => {
    if (!lead.company) { alert("El lead necesita una empresa para convertir"); return; }
    if (lead.status === "converted") { alert("Este lead ya fue convertido"); return; }
    try {
      // 1. Create Account
      const accRes = await api.post("crm_accounts", {
        name: lead.company, industry: lead.industry, phone: lead.phone, email: lead.email,
        type: "prospect", health_score: 50, owner_id: user.id, notes: "Convertido desde lead"
      });
      const accId = accRes?.[0]?.id;
      // 2. Create Contact
      const names = (lead.contact_name || "").split(" ");
      const ctcRes = await api.post("crm_contacts", {
        first_name: names[0] || lead.company, last_name: names.slice(1).join(" ") || "",
        email: lead.email, phone: lead.phone, account_id: accId, owner_id: user.id,
        notes: "Convertido desde lead"
      });
      const ctcId = ctcRes?.[0]?.id;
      // 3. Create Opportunity
      const firstStage = data.stages.find(s => s.order_num === 1) || data.stages[0];
      await api.post("crm_opportunities", {
        name: `Oportunidad - ${lead.company}`, account_id: accId, contact_id: ctcId,
        stage_id: firstStage?.id, amount: lead.estimated_value || 0,
        probability: firstStage?.probability || 10, source: lead.source,
        type: "new_business", priority: "medium", owner_id: user.id,
        notes: "Generada automáticamente desde conversión de lead"
      });
      // 4. Update Lead status
      await api.patch("crm_leads", lead.id, {
        status: "converted", converted_to_account: accId, converted_to_contact: ctcId,
        converted_at: new Date().toISOString()
      });
      alert(`✓ Lead convertido:\n• Cuenta: ${lead.company}\n• Contacto: ${lead.contact_name || lead.company}\n• Oportunidad creada en ${firstStage?.name || "Pipeline"}`);
      loadAll();
    } catch (err) { alert("Error al convertir: " + err.message); }
  };

  // ═══ WORKFLOW: Quote → Invoice ═══
  const quoteToInvoice = async (quote) => {
    if (quote.status !== "accepted") { alert("Solo se pueden facturar cotizaciones aceptadas"); return; }
    const existing = data.invoices.find(i => i.quote_id === quote.id);
    if (existing) { alert(`Ya existe la factura ${existing.invoice_number} para esta cotización`); return; }
    try {
      await api.post("crm_invoices", {
        invoice_number: `FAC-${uid()}`, quote_id: quote.id,
        opportunity_id: quote.opportunity_id, account_id: quote.account_id,
        contact_id: quote.contact_id, status: "sent",
        subtotal: quote.subtotal || 0, tax: quote.tax || 0,
        total: quote.total || 0, paid_amount: 0,
        due_date: new Date(Date.now() + 30 * 86400000).toISOString().slice(0, 10),
        notes: `Generada desde cotización ${quote.quote_number}`
      });
      alert(`✓ Factura generada desde cotización ${quote.quote_number}\nMonto: ${fm(quote.total)}\nVencimiento: 30 días`);
      loadAll();
    } catch (err) { alert("Error al generar factura: " + err.message); }
  };

  // ═══ WORKFLOW: Auto-calculate Forecast from Pipeline ═══
  const generateForecast = async () => {
    const now = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    const monthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0);
    const monthLabel = now.toLocaleDateString("es-AR", { month: "long", year: "numeric" });
    const activeOpps = data.opportunities.filter(o => {
      const s = data.stages.find(st => st.id === o.stage_id);
      return s && !s.is_won && !s.is_lost;
    });
    const wonThisMonth = data.opportunities.filter(o => {
      const s = data.stages.find(st => st.id === o.stage_id);
      if (!s?.is_won) return false;
      const cd = o.actual_close_date || o.updated_at;
      return cd && new Date(cd) >= monthStart && new Date(cd) <= monthEnd;
    });
    const bestCase = activeOpps.reduce((a, o) => a + (+o.amount || 0), 0);
    const mostLikely = activeOpps.reduce((a, o) => a + (+o.amount || 0) * ((+o.probability || 0) / 100), 0);
    const worstCase = activeOpps.filter(o => (+o.probability || 0) >= 50).reduce((a, o) => a + (+o.amount || 0) * ((+o.probability || 0) / 100), 0);
    const committed = activeOpps.filter(o => (+o.probability || 0) >= 75).reduce((a, o) => a + (+o.amount || 0), 0);
    const closed = wonThisMonth.reduce((a, o) => a + (+o.amount || 0), 0);
    try {
      await api.post("crm_forecasts", {
        period_label: monthLabel, start_date: ds(monthStart), end_date: ds(monthEnd),
        best_case: Math.round(bestCase), most_likely: Math.round(mostLikely),
        worst_case: Math.round(worstCase), committed: Math.round(committed),
        closed: Math.round(closed), owner_id: user.id,
        notes: `Auto-generado: ${activeOpps.length} oportunidades activas, ${wonThisMonth.length} cerradas este mes`
      });
      alert(`✓ Forecast generado para ${monthLabel}:\n• Mejor caso: ${fm(bestCase)}\n• Probable: ${fm(mostLikely)}\n• Comprometido: ${fm(committed)}\n• Cerrado: ${fm(closed)}`);
      loadAll();
    } catch (err) { alert("Error al generar forecast: " + err.message); }
  };

  // ═══ AUTO-SCORE ALL LEADS ═══
  const autoScoreLeads = async () => {
    const unscored = data.leads.filter(l => l.status !== "converted" && l.status !== "lost");
    let updated = 0;
    for (const lead of unscored) {
      const newScore = calcLeadScore(lead);
      if (newScore !== (lead.score || 0)) {
        await api.patch("crm_leads", lead.id, { score: newScore });
        updated++;
      }
    }
    alert(`✓ Scoring completado: ${updated} leads actualizados de ${unscored.length} analizados`);
    loadAll();
  };

  // ═══ REAL AUTOMATION ENGINE ═══
  const runAutomations = async (triggerType) => {
    const rules = data.automations.filter(a => a.trigger_type === triggerType && a.is_active);
    if (rules.length === 0) { alert(`No hay automatizaciones activas para: ${triggerType}`); return; }
    let executed = 0;
    for (const rule of rules) {
      await api.patch("crm_automations", rule.id, { runs_count: (rule.runs_count || 0) + 1, last_run_at: new Date().toISOString() });
      executed++;
    }
    // Execute trigger-specific actions
    if (triggerType === "task_overdue") {
      const overdue = data.tasks.filter(t => t.status === "pending" && t.due_date && t.due_date <= today);
      for (const t of overdue) { await api.patch("crm_tasks", t.id, { priority: "high" }); }
    }
    if (triggerType === "ticket_overdue") {
      const overdue = data.tickets.filter(t => (t.status === "open" || t.status === "in_progress") && t.sla_due_at && t.sla_due_at < new Date().toISOString());
      for (const t of overdue) {
        await api.post("crm_escalations", { ticket_id: t.id, reason: "sla_breach", notes: `Auto-escalado por SLA vencido` });
      }
    }
    if (triggerType === "deal_stale") {
      const stale = data.opportunities.filter(o => {
        const s = data.stages.find(st => st.id === o.stage_id);
        return s && !s.is_won && !s.is_lost && o.expected_close_date && o.expected_close_date < today;
      });
      for (const o of stale) { await api.patch("crm_opportunities", o.id, { priority: "high" }); }
    }
    if (triggerType === "account_inactive") {
      for (const acc of data.accounts) {
        const acts = data.activities.filter(a => a.account_id === acc.id);
        const lastAct = acts.length > 0 ? acts[0].created_at : null;
        if (!lastAct || (new Date() - new Date(lastAct)) > 30 * 86400000) {
          await api.post("crm_tasks", { title: `Reactivar cuenta: ${acc.name}`, type: "follow_up", priority: "medium", status: "pending", account_id: acc.id, owner_id: user.id, due_date: ds(new Date()) });
        }
      }
    }
    alert(`✓ ${executed} automatizaciones ejecutadas para trigger: ${triggerType}`);
    loadAll();
  };

  // ═══ SLA BREACH CHECKER ═══
  const checkSLABreaches = async () => {
    const breached = data.tickets.filter(t => (t.status === "open" || t.status === "in_progress") && t.sla_due_at && new Date(t.sla_due_at) < new Date());
    if (breached.length === 0) { alert("✓ No hay tickets con SLA vencido"); return; }
    let escalated = 0;
    for (const t of breached) {
      const existing = data.escalations.find(e => e.ticket_id === t.id && !e.resolved);
      if (!existing) {
        await api.post("crm_escalations", { ticket_id: t.id, reason: "sla_breach", escalated_from: t.assigned_to, notes: `SLA vencido. Debía resolverse antes de ${fd(t.sla_due_at)}` });
        escalated++;
      }
    }
    alert(`⚠️ ${breached.length} tickets con SLA vencido\n${escalated} nuevas escalaciones creadas`);
    loadAll();
  };

  // ═══ HEALTH SCORE UPDATER ═══
  const updateHealthScores = async () => {
    let updated = 0;
    for (const acc of data.accounts) {
      const opps = data.opportunities.filter(o => o.account_id === acc.id);
      const wonOpps = opps.filter(o => { const s = data.stages.find(st => st.id === o.stage_id); return s?.is_won; });
      const openTk = data.tickets.filter(t => t.account_id === acc.id && (t.status === "open" || t.status === "in_progress")).length;
      const acts = data.activities.filter(a => a.account_id === acc.id);
      const lastAct = acts.length > 0 ? acts[0].created_at : null;
      const daysInactive = lastAct ? Math.floor((new Date() - new Date(lastAct)) / 86400000) : 999;
      let score = 50;
      if (opps.length > 0) score += 10;
      if (wonOpps.length > 0) score += 15;
      if (wonOpps.length > 2) score += 10;
      if (openTk > 3) score -= 15;
      else if (openTk > 0) score -= 5;
      if (daysInactive < 7) score += 10;
      if (daysInactive > 30) score -= 15;
      if (daysInactive > 90) score -= 10;
      score = Math.max(0, Math.min(100, score));
      if (score !== (acc.health_score || 50)) {
        await api.patch("crm_accounts", acc.id, { health_score: score });
        updated++;
      }
    }
    alert(`✓ Health scores actualizados: ${updated} cuentas de ${data.accounts.length}`);
    loadAll();
  };

  // ═══ QUOTE → ORDER CONVERSION ═══
  const quoteToOrder = async (quote) => {
    if (quote.status !== "accepted") { alert("Solo cotizaciones aceptadas pueden generar pedidos"); return; }
    const existing = data.orders.find(o => o.quote_id === quote.id);
    if (existing) { alert(`Ya existe el pedido ${existing.order_number} para esta cotización`); return; }
    try {
      await api.post("crm_orders", {
        order_number: `ORD-${uid()}`, quote_id: quote.id, opportunity_id: quote.opportunity_id,
        account_id: quote.account_id, contact_id: quote.contact_id, owner_id: user.id,
        status: "confirmed", subtotal: quote.subtotal || 0, tax: quote.tax || 0, total: quote.total || 0,
        notes: `Generado desde cotización ${quote.quote_number}`
      });
      alert(`✓ Pedido generado desde cotización ${quote.quote_number}`);
      loadAll();
    } catch (err) { alert("Error: " + err.message); }
  };

  // ═══ BUSINESS RULE VALIDATION ═══
  const validateEntity = (entityType, entity) => {
    const errors = [];
    if (entityType === "lead") {
      if (!entity.company) errors.push("Un lead debe tener nombre de empresa");
      if (entity.status === "qualified" && !entity.owner_id) errors.push("Un lead calificado debe tener responsable");
      if (entity.status === "converted") errors.push("Un lead convertido no puede editarse");
    }
    if (entityType === "opportunity") {
      if (!entity.account_id) errors.push("Una oportunidad debe estar vinculada a una cuenta");
      const stage = data.stages.find(s => s.id === entity.stage_id);
      if (stage?.name === "Negociación" && (+entity.amount || 0) <= 0) errors.push("Una oportunidad en negociación debe tener monto > 0");
      if (stage?.is_won) errors.push("Una oportunidad ganada no puede cambiar de etapa");
    }
    if (entityType === "quote") {
      if ((+entity.total || 0) > 50000 && entity.status !== "draft") errors.push("⚠️ Cotización > $50,000 requiere aprobación del director");
      if ((+entity.discount_pct || 0) > 20) errors.push("⚠️ Descuento > 20% requiere aprobación");
    }
    if (entityType === "invoice") {
      if (entity.status === "paid") errors.push("No se puede editar una factura pagada");
    }
    return errors;
  };

  // ═══ COMPUTE NOTIFICATIONS ═══
  const notifications = [];
  const today = new Date().toISOString().slice(0, 10);
  const nowISO = new Date().toISOString();
  data.tasks.filter(t => t.status === "pending" && t.due_date && t.due_date <= today).forEach(t => {
    notifications.push({ id: "t-" + t.id, msg: `Tarea vencida: ${t.title}`, type: "warning" });
  });
  data.tickets.filter(t => t.status === "open" && t.priority === "critical").forEach(t => {
    notifications.push({ id: "tk-" + t.id, msg: `Ticket crítico: ${t.subject}`, type: "error" });
  });
  data.tickets.filter(t => (t.status === "open" || t.status === "in_progress") && t.sla_due_at && t.sla_due_at < nowISO).forEach(t => {
    notifications.push({ id: "sla-" + t.id, msg: `SLA vencido: ${t.ticket_number} - ${t.subject}`, type: "error" });
  });
  data.invoices.filter(i => i.status === "overdue" || (i.status === "sent" && i.due_date && i.due_date <= today)).forEach(i => {
    notifications.push({ id: "i-" + i.id, msg: `Factura vencida: ${i.invoice_number} (${fm(i.total)})`, type: "warning" });
  });
  data.opportunities.filter(o => {
    const s = data.stages.find(st => st.id === o.stage_id);
    return s && !s.is_won && !s.is_lost && o.expected_close_date && o.expected_close_date < today;
  }).forEach(o => {
    notifications.push({ id: "o-" + o.id, msg: `Oportunidad pasó fecha cierre: ${o.name}`, type: "warning" });
  });
  data.approvals.filter(a => a.status === "pending").forEach(a => {
    notifications.push({ id: "ap-" + a.id, msg: `Aprobación pendiente: ${a.entity_type} - ${a.reason || "sin motivo"}`, type: "warning" });
  });

  const pg = NAV.find(n => n.id === view)?.label || "Dashboard";
  // Guarda RBAC: si el rol no tiene permiso para la vista, muestra acceso denegado
  const effectiveView = canAccess(user.role, view) ? view : view;
  let content;

  if (!canAccess(user.role, view)) content = <AccessDenied />;
  else if (loading) content = <div className="empty" style={{ padding: 60 }}>Cargando datos...</div>;
  else if (view === "dashboard") content = <Dashboard data={data} />;
  else if (view === "pipeline") content = <PipelineView data={data} reload={loadAll} />;
  else if (view === "leads") content = <ListModule title="Lead" table="crm_leads" data={data.leads} reload={loadAll}
    filterOptions={{ key: "status", values: LEAD_STATUS }}
    topButtons={<button className="btn btn-sm" style={{ background: "rgba(124,58,237,.08)", color: "var(--pur)", border: "1px solid rgba(124,58,237,.2)", fontSize: 10 }} onClick={autoScoreLeads}>⚡ Auto-Score</button>}
    extraActions={(item) => item.status !== "converted" && item.status !== "lost" ? (
      <button className="btn btn-sm" style={{ background: "rgba(5,150,105,.08)", color: "var(--grn)", border: "1px solid rgba(5,150,105,.2)", marginRight: 4, fontSize: 9 }}
        onClick={() => convertLead(item)}>Convertir</button>
    ) : item.status === "converted" ? <span style={{ fontSize: 9, color: "var(--grn)", marginRight: 4 }}>✓ Convertido</span> : null}
    columns={[
      { key: "company", label: "Empresa" },
      { key: "contact_name", label: "Contacto" },
      { key: "source", label: "Fuente" },
      { key: "estimated_value", label: "Valor", render: v => <span style={{ fontFamily: "'JetBrains Mono',monospace", fontWeight: 600 }}>{fm(v)}</span> },
      { key: "score", label: "Puntaje", render: v => <span style={{ fontFamily: "'JetBrains Mono',monospace", fontWeight: 700, color: v >= 70 ? "var(--grn)" : v >= 40 ? "var(--ora)" : "var(--tx3)" }}>{v || 0}</span> },
      { key: "status", label: "Estado", render: v => <span className={`bd bd-${v}`}>{v}</span> },
    ]}
    formFields={[
      { key: "company", label: "Empresa" }, { key: "contact_name", label: "Contacto" }, { key: "email", label: "Email", type: "email" },
      { key: "phone", label: "Teléfono" }, { key: "estimated_value", label: "Valor", type: "number" }, { key: "score", label: "Puntaje", type: "number" },
      { key: "source", label: "Fuente", type: "select", options: LEAD_SOURCES }, { key: "status", label: "Estado", type: "select", options: LEAD_STATUS }, { key: "industry", label: "Industria" },
      { key: "comments", label: "Comentarios" },
    ]}
    newDefaults={{ status: "new", score: 0, estimated_value: 0, owner_id: user.id }}
  />;
  else if (view === "accounts") {
    if (selectedAccount) {
      const acc = data.accounts.find(a => a.id === selectedAccount);
      content = acc ? <Account360 account={acc} data={data} onBack={() => setSelectedAccount(null)} reload={loadAll} /> : <div className="empty">Cuenta no encontrada</div>;
    } else {
      content = <ListModule title="Cuenta" table="crm_accounts" data={data.accounts} reload={loadAll}
        topButtons={<button className="btn btn-sm" style={{ background: "rgba(124,58,237,.08)", color: "var(--pur)", border: "1px solid rgba(124,58,237,.2)", fontSize: 10 }} onClick={updateHealthScores}>⚡ Recalcular Health Scores</button>}
        extraActions={(item) => (
          <button className="btn btn-sm" style={{ background: "rgba(37,99,235,.08)", color: "var(--acc)", border: "1px solid rgba(37,99,235,.2)", marginRight: 4, fontSize: 9 }}
            onClick={() => setSelectedAccount(item.id)}>360°</button>
        )}
        columns={[
          { key: "name", label: "Nombre" }, { key: "industry", label: "Industria" }, { key: "type", label: "Tipo", render: v => <span className={`bd bd-${v === "customer" ? "won" : "open"}`}>{v}</span> },
          { key: "health_score", label: "Salud", render: v => <span style={{ fontFamily: "'JetBrains Mono'", fontWeight: 700, color: v >= 70 ? "var(--grn)" : v >= 40 ? "var(--ora)" : "var(--red)" }}>{v}%</span> },
          { key: "country", label: "País" },

  />;
  else if (view === "forecasts") content = <ListModule title="Forecast" table="crm_forecasts" data={data.forecasts} reload={loadAll}
    topButtons={<button className="btn btn-sm" style={{ background: "rgba(5,150,105,.08)", color: "var(--grn)", border: "1px solid rgba(5,150,105,.2)", fontSize: 10 }} onClick={generateForecast}>⚡ Auto-generar desde Pipeline</button>}
    columns={[
      { key: "period_label", label: "Período" },
      { key: "committed", label: "Comprometido", render: v => <span style={{ fontFamily: "'JetBrains Mono',monospace", fontWeight: 600 }}>{fm(v)}</span> },
      { key: "best_case", label: "Mejor Caso", render: v => <span style={{ fontFamily: "'JetBrains Mono',monospace", color: "var(--grn)" }}>{fm(v)}</span> },
      { key: "most_likely", label: "Probable", render: v => <span style={{ fontFamily: "'JetBrains Mono',monospace", color: "var(--acc)" }}>{fm(v)}</span> },
      { key: "worst_case", label: "Peor Caso", render: v => <span style={{ fontFamily: "'JetBrains Mono',monospace", color: "var(--red)" }}>{fm(v)}</span> },
      { key: "closed", label: "Cerrado", render: v => <span style={{ fontFamily: "'JetBrains Mono',monospace", fontWeight: 700, color: "var(--grn)" }}>{fm(v)}</span> },
    ]}
    formFields={[
      { key: "period_label", label: "Período *" }, { key: "start_date", label: "Inicio", type: "date" }, { key: "end_date", label: "Fin", type: "date" },
      { key: "best_case", label: "Mejor Caso", type: "number" }, { key: "most_likely", label: "Probable", type: "number" }, { key: "worst_case", label: "Peor Caso", type: "number" },
      { key: "committed", label: "Comprometido", type: "number" }, { key: "closed", label: "Cerrado", type: "number" },
      { key: "notes", label: "Notas" },
      { key: "comments", label: "Comentarios" },
    ]}
    newDefaults={{ best_case: 0, most_likely: 0, worst_case: 0, committed: 0, closed: 0, owner_id: user.id }}
  />;
  else if (view === "teams") content = <ListModule title="Equipo" table="crm_teams" data={data.teams} reload={loadAll}
    columns={[
      { key: "name", label: "Equipo" },
      { key: "description", label: "Descripción" },
      { key: "manager_id", label: "Gerente", render: v => { const u = data.teams.length ? null : null; return "—"; } },
    ]}
    formFields={[
      { key: "name", label: "Nombre *" },
      { key: "description", label: "Descripción" },
      { key: "comments", label: "Comentarios" },
    ]}
    newDefaults={{}}
  />;
  else if (view === "territories") content = <ListModule title="Territorio" table="crm_territories" data={data.territories} reload={loadAll}
    columns={[
      { key: "name", label: "Territorio" },
      { key: "region", label: "Región" },
      { key: "country", label: "País" },
    ]}
    formFields={[
      { key: "name", label: "Nombre *" }, { key: "region", label: "Región" }, { key: "country", label: "País" },
      { key: "description", label: "Descripción" },
      { key: "comments", label: "Comentarios" },
    ]}
    newDefaults={{}}
  />;
  else if (view === "automations") content = <ListModule title="Automatización" table="crm_automations" data={data.automations} reload={loadAll}
    topButtons={<div style={{ display: "flex", gap: 4 }}>
      <button className="btn btn-sm" style={{ background: "rgba(5,150,105,.08)", color: "var(--grn)", border: "1px solid rgba(5,150,105,.2)", fontSize: 9 }} onClick={() => runAutomations("task_overdue")}>▶ Tareas Vencidas</button>
      <button className="btn btn-sm" style={{ background: "rgba(220,38,38,.08)", color: "var(--red)", border: "1px solid rgba(220,38,38,.2)", fontSize: 9 }} onClick={() => runAutomations("ticket_overdue")}>▶ Tickets SLA</button>
      <button className="btn btn-sm" style={{ background: "rgba(249,115,22,.08)", color: "var(--ora)", border: "1px solid rgba(249,115,22,.2)", fontSize: 9 }} onClick={() => runAutomations("deal_stale")}>▶ Deals Estancados</button>
      <button className="btn btn-sm" style={{ background: "rgba(37,99,235,.08)", color: "var(--acc)", border: "1px solid rgba(37,99,235,.2)", fontSize: 9 }} onClick={() => runAutomations("account_inactive")}>▶ Cuentas Inactivas</button>
      <button className="btn btn-sm" style={{ background: "rgba(124,58,237,.08)", color: "var(--pur)", border: "1px solid rgba(124,58,237,.2)", fontSize: 9 }} onClick={updateHealthScores}>▶ Health Scores</button>
    </div>}
    columns={[
      { key: "name", label: "Nombre" },
      { key: "trigger_type", label: "Disparador", render: v => <span className={`bd bd-${v?.includes("overdue") ? "critical" : "open"}`}>{v}</span> },
      { key: "is_active", label: "Activa", render: v => <span className={`bd bd-${v ? "won" : "cancelled"}`}>{v ? "Sí" : "No"}</span> },
      { key: "runs_count", label: "Ejecuciones" },
      { key: "last_run_at", label: "Última Ejecución", render: v => fd(v) },
    ]}
    formFields={[
      { key: "name", label: "Nombre *" }, { key: "trigger_type", label: "Disparador", type: "select", options: AUTOMATION_TRIGGERS },
      { key: "is_active", label: "Activa", type: "select", options: [{ v: true, t: "Sí" }, { v: false, t: "No" }] },
      { key: "description", label: "Descripción" },
      { key: "comments", label: "Comentarios" },
    ]}
    newDefaults={{ trigger_type: "lead_created", is_active: true, runs_count: 0, created_by: user.id }}
  />;
  else if (view === "surveys") content = <ListModule title="Encuesta" table="crm_surveys" data={data.surveys} reload={loadAll}
    columns={[
      { key: "type", label: "Tipo", render: v => <span className="bd bd-open">{(v || "").toUpperCase()}</span> },
      { key: "score", label: "Puntaje", render: v => <span style={{ fontFamily: "'JetBrains Mono',monospace", fontWeight: 700, color: v >= 8 ? "var(--grn)" : v >= 5 ? "var(--ora)" : "var(--red)" }}>{v}/10</span> },
      { key: "account_id", label: "Cuenta", render: v => data.accounts.find(a => a.id === v)?.name || "—" },
      { key: "comment", label: "Comentario" },
      { key: "responded_at", label: "Fecha", render: v => fd(v) },
    ]}
    formFields={[
      { key: "type", label: "Tipo", type: "select", options: SURVEY_TYPES }, { key: "score", label: "Puntaje (1-10)", type: "number" },
      { key: "account_id", label: "Cuenta", type: "select", options: accOpts },
      { key: "contact_id", label: "Contacto", type: "select", options: ctcOpts },
      { key: "ticket_id", label: "Ticket", type: "select", options: [{ v: "", t: "— Ninguno —" }, ...data.tickets.map(t => ({ v: t.id, t: t.ticket_number + " - " + t.subject }))] },
      { key: "responded_at", label: "Fecha Respuesta", type: "date" },
      { key: "comment", label: "Comentario" },
      { key: "comments", label: "Comentarios" },
    ]}
    newDefaults={{ type: "csat", score: 5, responded_at: ds(new Date()) }}
  />;
  else if (view === "ai") content = <AIAssistant data={data} user={user} />;
  else if (view === "reports") content = <Reports data={data} />;
  else if (view === "orders") content = <ListModule title="Pedido" table="crm_orders" data={data.orders} reload={loadAll}
    columns={[
      { key: "order_number", label: "N°" },
      { key: "account_id", label: "Cuenta", render: v => data.accounts.find(a => a.id === v)?.name || "—" },
      { key: "total", label: "Total", render: v => <span style={{ fontFamily: "'JetBrains Mono',monospace", fontWeight: 700 }}>{fm(v)}</span> },
      { key: "status", label: "Estado", render: v => <span className={`bd bd-${v}`}>{v}</span> },
    ]}
    formFields={[
      { key: "order_number", label: "N° *" }, { key: "account_id", label: "Cuenta", type: "select", options: accOpts }, { key: "status", label: "Estado", type: "select", options: ORDER_STATUS },
      { key: "subtotal", label: "Subtotal", type: "number" }, { key: "tax", label: "Impuesto", type: "number" }, { key: "total", label: "Total", type: "number" },
      { key: "quote_id", label: "Cotización", type: "select", options: [{ v: "", t: "— Ninguna —" }, ...data.quotes.map(q => ({ v: q.id, t: q.quote_number }))] },
      { key: "shipping_address", label: "Dirección Envío" }, { key: "notes", label: "Notas" },
      { key: "comments", label: "Comentarios" },
    ]}
    newDefaults={{ status: "pending", order_number: `ORD-${uid()}`, owner_id: user.id }}
  />;
  else if (view === "sla") content = <ListModule title="Política SLA" table="crm_sla_policies" data={data.sla_policies} reload={loadAll}
    columns={[
      { key: "name", label: "Nombre" },
      { key: "priority", label: "Prioridad", render: v => <span className={`bd bd-${v}`}>{v}</span> },
      { key: "first_response_hours", label: "1ra Resp. (hrs)" },
      { key: "resolution_hours", label: "Resolución (hrs)" },
      { key: "escalation_hours", label: "Escalación (hrs)" },
      { key: "is_active", label: "Activa", render: v => <span className={`bd bd-${v ? "won" : "cancelled"}`}>{v ? "Sí" : "No"}</span> },
    ]}
    formFields={[
      { key: "name", label: "Nombre *" }, { key: "priority", label: "Prioridad", type: "select", options: PRIORITIES },
      { key: "first_response_hours", label: "1ra Resp. hrs", type: "number" },
      { key: "resolution_hours", label: "Resolución hrs", type: "number" }, { key: "escalation_hours", label: "Escalación hrs", type: "number" },
      { key: "is_active", label: "Activa", type: "select", options: [{ v: true, t: "Sí" }, { v: false, t: "No" }] },
      { key: "comments", label: "Comentarios" },
    ]}
    newDefaults={{ first_response_hours: 24, resolution_hours: 72, escalation_hours: 48, is_active: true }}
  />;
  else if (view === "inbox") {
    const allMsgs = [
      ...data.conversations.map(c => ({ ...c, _type: "conv", _date: c.created_at })),
      ...data.activities.filter(a => a.type === "email" || a.type === "call" || a.type === "whatsapp").map(a => ({ ...a, _type: "act", _date: a.created_at, channel: a.type, subject: a.subject, body: a.description })),
    ].sort((a, b) => (b._date || "").localeCompare(a._date || ""));
    content = (
      <div className="fin">
        <div className="card" style={{ marginBottom: 12 }}>
          <div className="card-lb">Bandeja Omnicanal</div>
          <div style={{ fontSize: 11, color: "var(--tx2)" }}>{allMsgs.length} mensajes · Email, WhatsApp, Llamadas, Chat</div>
        </div>
        <div className="tbl">
          {allMsgs.length > 0 ? <table><thead><tr><th>Canal</th><th>Dir.</th><th>Asunto</th><th>Contacto</th><th>Cuenta</th><th>Fecha</th></tr></thead><tbody>
            {allMsgs.slice(0, 50).map((m, i) => {
              const ctc = data.contacts.find(c => c.id === m.contact_id);
              const acc = data.accounts.find(a => a.id === m.account_id);
              return <tr key={i}>
                <td><span className={`bd bd-${m.channel === "email" ? "sent" : m.channel === "whatsapp" ? "qualified" : m.channel === "phone" ? "contacted" : "open"}`}>{m.channel || m.type}</span></td>
                <td style={{ fontSize: 10 }}>{m.direction === "inbound" ? "↓ In" : "↑ Out"}</td>
                <td style={{ fontWeight: 500 }}>{m.subject || "Sin asunto"}</td>
                <td style={{ fontSize: 10 }}>{ctc ? `${ctc.first_name} ${ctc.last_name || ""}` : "—"}</td>
                <td style={{ fontSize: 10 }}>{acc?.name || "—"}</td>
                <td style={{ fontSize: 10 }}>{fd(m._date)}</td>
              </tr>;
            })}
          </tbody></table> : <div className="empty">{t("Bandeja vacía")}</div>}
        </div>
      </div>
    );
  }
  else if (view === "approvals") content = <ListModule title="Aprobación" table="crm_approvals" data={data.approvals} reload={loadAll}
    columns={[
      { key: "entity_type", label: "Entidad" },
      { key: "status", label: "Estado", render: v => <span className={`bd bd-${v === "approved" ? "won" : v === "rejected" ? "critical" : "pending"}`}>{v}</span> },
      { key: "reason", label: "Motivo" },
      { key: "created_at", label: "Fecha", render: v => fd(v) },
    ]}
    formFields={[
      { key: "entity_type", label: "Entidad" }, { key: "entity_id", label: "ID Entidad" },
      { key: "status", label: "Estado", type: "select", options: APPROVAL_STATUS },
      { key: "reason", label: "Motivo" }, { key: "response_note", label: "Nota Respuesta" },
      { key: "responded_at", label: "Fecha Resp.", type: "date" },
      { key: "comments", label: "Comentarios" },
    ]}
    newDefaults={{ status: "pending", requested_by: user.id }}
  />;

  return (
    <LangContext.Provider value={{ lang, setLang, t }}>
      <style>{css}</style>
      <div className="crm">
        <aside className="sb">
          <div className="sb-hd">PLATINUM<span>CRM</span></div>
          <nav className="sb-nv">
            {(() => {
              const groups = { principal: t("Principal"), comercial: t("Comercial"), operaciones: t("Operaciones"), soporte: t("Soporte"), finanzas: t("Finanzas"), comunicación: t("Comunicación"), analytics: t("Analytics"), inteligencia: t("Inteligencia"), admin: t("Administración") };
              let lastGroup = "";
              // Filtra ítems de nav según rol del usuario
              const visibleNav = NAV.filter(n => canAccess(user.role, n.id));
              return visibleNav.map(n => {
                const items = [];
                if (n.group !== lastGroup) { lastGroup = n.group; items.push(<div key={"g-" + n.group} style={{ fontSize: 7, fontWeight: 800, color: "var(--tx3)", textTransform: "uppercase", letterSpacing: 1.2, padding: "4px 10px 0px", marginTop: 1 }}>{groups[n.group] || n.group}</div>); }
                items.push(<button key={n.id} className={`sb-it${view === n.id ? " ac" : ""}`} onClick={() => { if (canAccess(user.role, n.id)) { setView(n.id); setSelectedAccount(null); setSelectedContact(null); setSelectedOpp(null); setShowNotif(false); } }}><Ic name={n.icon} size={14} /><span>{t(n.label)}</span></button>);
                return items;
              }).flat();
            })()}
          </nav>
          <div className="sb-ft">
            <div className="sb-av">{user.avatar}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 11, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{user.name}</div>
              <div style={{ fontSize: 9, color: "var(--tx3)" }}>{ROLE_LABELS[user.role] || user.role} · {user.region}</div>
            </div>
            <button onClick={() => setUser(null)} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--tx3)" }} title={t("Cerrar sesión")}><Ic name="logout" size={15} /></button>
          </div>
        </aside>
        <div className="mn">
          <div className="tp">
            <h1>{pg}</h1>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <span className={`role-badge role-${user.role}`}>
                {ROLE_LABELS[user.role] || user.role}
              </span>
              <button
                onClick={() => setLang(lang === "es" ? "en" : "es")}
                style={{ 
                  background: "var(--bg3)", 
                  border: "1px solid var(--bdr)", 
                  color: "var(--tx1)", 
                  fontSize: 10, 
                  fontWeight: 700, 
                  padding: "4px 8px", 
                  borderRadius: 6, 
                  cursor: "pointer",
                  display: "flex",
                  alignItems: "center",
                  gap: 4
                }}
              >
                <span>{lang === "es" ? "🇺🇸 EN" : "🇪🇸 ES"}</span>
              </button>
              <div style={{ position: "relative" }}>
                <button onClick={() => setShowNotif(!showNotif)} style={{ background: "none", border: "none", cursor: "pointer", color: notifications.length > 0 ? "var(--ora)" : "var(--tx3)", fontSize: 18 }} title={`${notifications.length} ${t("Notificaciones").toLowerCase()}`}>
                  🔔
                  {notifications.length > 0 && <span style={{ position: "absolute", top: -4, right: -6, background: "var(--red)", color: "#fff", fontSize: 8, fontWeight: 700, width: 16, height: 16, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center" }}>{notifications.length}</span>}
                </button>
                {showNotif && (
                  <div style={{ position: "absolute", top: 30, right: 0, width: 300, background: "var(--bg2)", border: "1px solid var(--bdr)", borderRadius: 10, boxShadow: "0 8px 30px rgba(0,0,0,.12)", zIndex: 200, maxHeight: 300, overflowY: "auto" }}>
                    <div style={{ padding: "8px 12px", borderBottom: "1px solid var(--bdr)", fontSize: 11, fontWeight: 700 }}>{t("Notificaciones")} ({notifications.length})</div>
                    {notifications.length > 0 ? notifications.map(n => (
                      <div key={n.id} style={{ padding: "6px 12px", borderBottom: "1px solid var(--bdr)", fontSize: 10, color: n.type === "error" ? "var(--red)" : "var(--ora)" }}>
                        {n.type === "error" ? "🔴" : "🟠"} {t(n.msg) || n.msg}
                      </div>
                    )) : <div style={{ padding: 16, textAlign: "center", fontSize: 11, color: "var(--tx3)" }}>{t("Sin notificaciones")}</div>}
                  </div>
                )}
              </div>
              <div className="tp-dt">{new Date().toLocaleDateString(lang === "es" ? "es-AR" : "en-US", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}</div>
            </div>
          </div>
          <div className="pg">{content}</div>
        </div>
      </div>
    </LangContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>

// ═══ FIELD ═══
function Fld({ label, value, onChange, type = "text", options, placeholder, rows }) {
  let el;
  if (type === "select") {
    el = (
      <select className="ipt" value={value ?? ""} onChange={e => onChange(e.target.value)}>
        <option value="">— seleccionar —</option>
        {(options || []).map(o => typeof o === "string"
          ? <option key={o} value={o}>{o}</option>
          : <option key={o.v} value={o.v}>{o.t}</option>)}
      </select>
    );
  } else if (type === "textarea") {
    el = <textarea className="ipt" style={{ minHeight: rows ? rows * 20 + "px" : "54px", resize: "vertical" }} value={value ?? ""} placeholder={placeholder} onChange={e => onChange(e.target.value)} />;
  } else {
    el = <input className="ipt" type={type} value={value ?? ""} placeholder={placeholder} onChange={e => onChange(type === "number" ? (e.target.value === "" ? "" : Number(e.target.value)) : e.target.value)} />;
  }
  return <div className="ig"><label>{label}</label>{el}</div>;
}

// ═══ MODAL ═══
function Modal({ title, onClose, onSave, onDelete, saving, children }) {
  return (
    <div className="mo" onClick={onClose}>
      <div className="mdl" onClick={e => e.stopPropagation()}>
        <div className="mdl-h">
          <h3>{title}</h3>
          <button className="btn btn-s btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="mdl-b">{children}</div>
        <div className="mdl-f">
          {onDelete && <button className="btn btn-d btn-sm" onClick={onDelete}>Eliminar</button>}
          <button className="btn btn-s btn-sm" onClick={onClose}>Cancelar</button>
          {onSave && <button className="btn btn-p btn-sm" onClick={onSave} disabled={saving}>{saving ? "Guardando…" : "Guardar"}</button>}
        </div>
      </div>
    </div>
  );
}

// ═══ BADGE ═══
function Bd({ v }) {
  if (!v) return <span className="bd bd-draft">—</span>;
  return <span className={`bd bd-${v}`}>{v.replace(/_/g, " ")}</span>;
}

// ═══ LOGIN ═══
const ROLES = [
  { role: "ceo",       icon: "👑", label: "CEO" },
  { role: "admin",     icon: "🛡️", label: "Admin" },
  { role: "manager",   icon: "📊", label: "Gerente" },
  { role: "sales_rep", icon: "🚀", label: "Vendedor" },
  { role: "support",   icon: "🎧", label: "Soporte" },
  { role: "finance",   icon: "💰", label: "Finanzas" },
];

function Login({ onLogin }) {
  const [role, setRole] = useState("");
  const [name, setName] = useState("");
  const [err, setErr] = useState("");

  const go = () => {
    if (!role) { setErr("Seleccioná un rol"); return; }
    if (!name.trim()) { setErr("Ingresá tu nombre"); return; }
    const u = { name: name.trim(), role };
    localStorage.setItem("erp_user", JSON.stringify(u));
    onLogin(u);
  };

  return (
    <div className="lw">
      <div className="l-box fin">
        <div className="l-box-logo">ERP <span>NORIVA</span></div>
        <div className="l-box-sub">Sistema de Gestión Empresarial · v2.0</div>
        <div style={{ marginBottom: 10, fontSize: 11, fontWeight: 700, color: "var(--tx2)" }}>Seleccioná tu rol</div>
        <div className="l-role-grid">
          {ROLES.map(r => (
            <button key={r.role} className={`l-role-btn${role === r.role ? " sel" : ""}`} onClick={() => { setRole(r.role); setErr(""); }}>
              <div className="l-role-icon">{r.icon}</div>
              <div className="l-role-name">{r.label}</div>
            </button>
          ))}
        </div>
        <div style={{ marginBottom: 10 }}>
          <Fld label="Tu nombre" value={name} onChange={v => { setName(v); setErr(""); }} placeholder="Ej: María González" />
        </div>
        {err && <div style={{ fontSize: 10, color: "var(--red)", marginBottom: 8, padding: "6px 10px", background: "rgba(220,38,38,.06)", borderRadius: 6, border: "1px solid rgba(220,38,38,.15)" }}>{err}</div>}
        <button className="btn btn-p" style={{ width: "100%", justifyContent: "center", padding: "9px 0", fontSize: 12 }} onClick={go}>
          Ingresar al ERP →
        </button>
        <div style={{ marginTop: 16, textAlign: "center" }}>
          <a href="index.html" style={{ fontSize: 10, color: "var(--tx3)", textDecoration: "none" }}>← Volver al CRM</a>
        </div>
      </div>
    </div>
  );
}

// ═══ DASHBOARD ═══
function Dashboard({ data }) {
  const { fixedAssets, arInvoices, employees, projects, purchaseOrders } = data;
  const totalActivos = fixedAssets.reduce((a, x) => a + (+x.purchase_cost || 0), 0);
  const factPendientes = arInvoices.filter(x => x.status === "open").length;
  const empActivos = employees.filter(x => x.status === "active").length;
  const projEnCurso = projects.filter(x => x.status === "in_progress").length;

  const recentAR = [...arInvoices].sort((a, b) => new Date(b.created_at || b.issue_date || 0) - new Date(a.created_at || a.issue_date || 0)).slice(0, 5);
  const recentPO = [...purchaseOrders].sort((a, b) => new Date(b.created_at || b.order_date || 0) - new Date(a.created_at || a.order_date || 0)).slice(0, 5);

  return (
    <div className="fin">
      <div className="grid4">
        <div className="card kpi-accent">
          <div className="card-icon">🏛️</div>
          <div className="card-lb">Total Activos Fijos</div>
          <div className="card-vl" style={{ color: "var(--acc)" }}>{fm(totalActivos)}</div>
          <div className="card-sub">{fixedAssets.length} activos registrados</div>
        </div>
        <div className="card kpi-amber">

// ═══ GENERIC TABLE VIEW ═══
function GenericView({ title, table, columns, defaultForm, data, onReload, statusOptions }) {
  const [search, setSearch] = useState("");
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({});
  const [saving, setSaving] = useState(false);

  const rows = (data || []).filter(r =>
    columns.some(c => String(r[c.key] ?? "").toLowerCase().includes(search.toLowerCase()))
  );

  const openNew = () => { setForm({ ...defaultForm }); setModal({ type: "new" }); };
  const openEdit = r => { setForm({ ...r }); setModal({ type: "edit", data: r }); };
  const closeModal = () => { setModal(null); setForm({}); };

  const save = async () => {
    setSaving(true);
    try {
      if (modal.type === "new") {
        const payload = { ...form, id: uid() };
        await api.post(table, payload);
      } else {
        await api.patch(table, form.id, form);
      }
      await onReload();
      closeModal();
    } catch (e) { alert("Error al guardar"); }
    setSaving(false);
  };

  const del = async () => {
    if (!confirm("¿Eliminar este registro?")) return;
    await api.del(table, form.id);
    await onReload();
    closeModal();
  };

  const setF = (k, v) => setForm(f => ({ ...f, [k]: v }));

  return (
    <div className="fin">
      <div className="tbl">
        <div className="tbl-hd">
          <h3>{title}</h3>
          <div className="tbl-acts">
            <div className="srch">
              <span style={{ fontSize: 12, color: "var(--tx3)" }}>🔍</span>
              <input placeholder="Buscar…" value={search} onChange={e => setSearch(e.target.value)} />
            </div>
            <button className="btn btn-p btn-sm" onClick={openNew}>+ Nuevo</button>
          </div>
        </div>
        <table>
          <thead>
            <tr>{columns.map(c => <th key={c.key}>{c.label}</th>)}</tr>
          </thead>
          <tbody>
            {rows.length === 0 && <tr><td colSpan={columns.length} className="empty">Sin registros</td></tr>}
            {rows.map(r => (
              <tr key={r.id} onClick={() => openEdit(r)}>
                {columns.map(c => (
                  <td key={c.key}>
                    {c.badge ? <Bd v={r[c.key]} /> :
                     c.money ? <span style={{ fontFamily: "JetBrains Mono", fontSize: 10 }}>{fm(r[c.key])}</span> :
                     c.date  ? fd(r[c.key]) :
                     c.mono  ? <span style={{ fontFamily: "JetBrains Mono", fontSize: 10 }}>{r[c.key] ?? "—"}</span> :
                     (r[c.key] ?? "—")}
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {modal && (
        <Modal title={modal.type === "new" ? `Nuevo — ${title}` : `Editar registro`} onClose={closeModal} onSave={save} onDelete={modal.type === "edit" ? del : null} saving={saving}>
          <div className="form-row c2">
            {columns.map(c => {
              if (c.hidden) return null;
              if (c.badge && statusOptions) {
                return <Fld key={c.key} label={c.label} type="select" value={form[c.key]} onChange={v => setF(c.key, v)} options={statusOptions} />;
              }
              if (c.money || c.type === "number") {
                return <Fld key={c.key} label={c.label} type="number" value={form[c.key]} onChange={v => setF(c.key, v)} />;
              }
              if (c.date || c.type === "date") {
                return <Fld key={c.key} label={c.label} type="date" value={form[c.key] ? form[c.key].slice(0,10) : ""} onChange={v => setF(c.key, v)} />;
              }
              return <Fld key={c.key} label={c.label} value={form[c.key]} onChange={v => setF(c.key, v)} />;
            })}
          </div>
        </Modal>
      )}
    </div>
  );
}

      { key: "status", label: "Estado", badge: true },

}

// ═══ IA COGNITIVA ═══
function IAView({ data }) {
  const [analyzing, setAnalyzing] = useState(false);
  const [analyzed, setAnalyzed] = useState(false);
  const [recs, setRecs] = useState([]);

  const { arInvoices, apBills, stockLevels, employees, projects, purchaseOrders, workOrders } = data;

  const overdueAR = arInvoices.filter(x => x.status === "overdue").length;
  const openAR = arInvoices.filter(x => x.status === "open").length;
  const lowStock = stockLevels.filter(x => (+x.quantity_on_hand || 0) <= (+x.reorder_point || 0)).length;
  const activeProjects = projects.filter(x => x.status === "in_progress").length;
  const draftPOs = purchaseOrders.filter(x => x.status === "draft").length;
  const pendingWOs = workOrders.filter(x => x.status === "planned" || x.status === "draft").length;

  const insights = [
    {
      icon: "💰",
      title: "Salud Financiera AR",
      body: `Hay ${openAR} facturas abiertas y ${overdueAR} vencidas en Cuentas por Cobrar. ${overdueAR > 0 ? "Se recomienda iniciar gestión de cobranza inmediata para las facturas vencidas." : "El estado de cobros se encuentra bajo control."} El ratio de vencimiento es ${arInvoices.length > 0 ? Math.round(overdueAR / arInvoices.length * 100) : 0}%.`
    },
    {
      icon: "📦",
      title: "Estado de Inventario",
      body: `Se detectaron ${lowStock} SKU${lowStock !== 1 ? "s" : ""} con stock igual o por debajo del punto de reorden. ${lowStock > 0 ? "Se sugiere revisar y generar órdenes de compra para evitar quiebres de stock." : "Los niveles de inventario están dentro de los parámetros normales."} Hay ${draftPOs} OC en borrador pendientes de aprobación.`
    },
    {
      icon: "🏭",
      title: "Capacidad Productiva",
      body: `Existen ${pendingWOs} órdenes de trabajo planificadas esperando inicio. Con ${activeProjects} proyectos en curso, la carga operativa ${pendingWOs > 5 ? "es alta y podría generar cuellos de botella" : "se encuentra dentro de la capacidad normal"}. Se recomienda revisar la planificación MRP semanalmente.`
    },
  ];

  const mockRecs = [
    "🎯 Priorizar cobro de las " + overdueAR + " facturas vencidas — potencial recupero de flujo de caja inmediato.",
    "📊 Ejecutar corrida MRP para los próximos 30 días con base en " + pendingWOs + " OTs pendientes.",
    "🔄 Revisar los " + draftPOs + " pedidos de compra en borrador y aprobar los críticos para evitar quiebres.",
    "👥 Con " + employees.filter(x => x.status === "active").length + " empleados activos, verificar capacidad de equipo vs. proyectos en curso.",
    "💡 Considerar automatizar alertas de stock mínimo para los " + lowStock + " SKUs en nivel crítico.",
  ];

  const generar = () => {
    setAnalyzing(true);
    setTimeout(() => {
      setRecs(mockRecs);
      setAnalyzing(false);
      setAnalyzed(true);
    }, 2200);
  };

  return (
    <div className="fin">
      <div style={{ marginBottom: 16 }}>
        <div className="section-title">Análisis de Inteligencia Artificial</div>
        <div className="grid3" style={{ marginBottom: 0 }}>
          {insights.map((ins, i) => (
            <div key={i} className="ai-card">
              <div className="ai-card-icon">{ins.icon}</div>
              <div className="ai-card-title">{ins.title}</div>
              <div className="ai-card-body">{ins.body}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ marginBottom: 16 }}>
        <div className="section-title" style={{ marginBottom: 10 }}>Detección de Anomalías</div>
        <div className="card" style={{ padding: "12px 14px" }}>
          {overdueAR > 0 && (
            <div className="ai-alert ai-alert-err">
              <span style={{ fontSize: 16 }}>🔴</span>
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: "var(--red)", marginBottom: 2 }}>Facturas AR Vencidas</div>
                <div style={{ fontSize: 10, color: "var(--tx2)" }}>{overdueAR} factura(s) con estado "overdue" detectada(s). Acción requerida.</div>
              </div>
            </div>
          )}
          {lowStock > 0 && (
            <div className="ai-alert ai-alert-warn">
              <span style={{ fontSize: 16 }}>🟡</span>
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: "var(--amb)", marginBottom: 2 }}>Stock Crítico Detectado</div>
                <div style={{ fontSize: 10, color: "var(--tx2)" }}>{lowStock} SKU(s) en o por debajo del punto de reorden. Revisar abastecimiento.</div>
              </div>
            </div>
          )}
          {draftPOs > 0 && (
            <div className="ai-alert ai-alert-warn">
              <span style={{ fontSize: 16 }}>🟠</span>
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: "var(--amb)", marginBottom: 2 }}>Órdenes de Compra Sin Aprobar</div>
                <div style={{ fontSize: 10, color: "var(--tx2)" }}>{draftPOs} OC(s) en borrador aguardando aprobación.</div>
              </div>
            </div>
          )}
          {overdueAR === 0 && lowStock === 0 && draftPOs === 0 && (
            <div className="ai-alert ai-alert-ok">
              <span style={{ fontSize: 16 }}>🟢</span>
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: "var(--grn)", marginBottom: 2 }}>Sin Anomalías Detectadas</div>
                <div style={{ fontSize: 10, color: "var(--tx2)" }}>Todos los indicadores se encuentran dentro de parámetros normales.</div>
              </div>
            </div>
          )}
        </div>
      </div>

      <div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
          <div className="section-title" style={{ marginBottom: 0 }}>Recomendaciones de Proceso</div>
          <button className="btn btn-p btn-sm" onClick={generar} disabled={analyzing}>
            {analyzing ? "🤖 Analizando…" : "🤖 Generar Análisis"}
          </button>
        </div>
        <div className="card" style={{ padding: "12px 14px" }}>
          {!analyzed && !analyzing && (
            <div className="empty" style={{ padding: "20px" }}>
              Presioná "Generar Análisis" para obtener recomendaciones basadas en los datos actuales del ERP.
            </div>
          )}
          {analyzing && (
            <div className="empty" style={{ padding: "20px" }}>
              <div style={{ fontSize: 20, marginBottom: 8 }}>🤖</div>
              Procesando datos y generando insights…
            </div>
          )}
          {analyzed && recs.map((r, i) => (
            <div key={i} style={{ padding: "8px 0", borderBottom: i < recs.length - 1 ? "1px solid var(--bdr)" : "none", fontSize: 11, color: "var(--tx2)", lineHeight: 1.5 }}>
              {r}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ═══ MAIN APP ═══
function App() {
  const [user, setUser] = useState(null);
  const [view, setView] = useState("dashboard");
  const [openSections, setOpenSections] = useState({ dashboard: true, finanzas: false, inventario: false, manufactura: false, supply: false, hcm: false, proyectos: false, ia: false });
  const [data, setData] = useState({
    journalEntries: [], arInvoices: [], apBills: [], fixedAssets: [], budgets: [],
    warehouses: [], skus: [], stockLevels: [], stockMovements: [],
    workOrders: [], boms: [], mrpPlans: [], maintenanceOrders: [],
    vendors: [], purchaseOrders: [], receipts: [], shipments: [],
    employees: [], payrollRuns: [], attendance: [], timeOff: [],
    projects: [], projectTasks: [], timesheets: [], milestones: [],
  });
  const [loading, setLoading] = useState(false);

  // Init user
  useEffect(() => {
    const erpU = localStorage.getItem("erp_user");
    if (erpU) { try { setUser(JSON.parse(erpU)); return; } catch {} }
    const crmU = localStorage.getItem("crm_user");
    if (crmU) { try { const u = JSON.parse(crmU); setUser({ name: u.name || u.email || "Usuario", role: u.role || "admin" }); return; } catch {} }
  }, []);

  const loadAll = useCallback(async () => {
    setLoading(true);
    try {
      const [
        journalEntries, arInvoices, apBills, fixedAssets, budgets,
        warehouses, skus, stockLevels, stockMovements,
        workOrders, boms, mrpPlans, maintenanceOrders,
        vendors, purchaseOrders, receipts, shipments,
        employees, payrollRuns, attendance, timeOff,
        projects, projectTasks, timesheets, milestones,
      ] = await Promise.all([
        api.get("erp_journal_entries", "&order=created_at.desc&limit=200"),
        api.get("erp_ar_invoices", "&order=created_at.desc&limit=200"),
        api.get("erp_ap_bills", "&order=created_at.desc&limit=200"),
        api.get("erp_fixed_assets", "&order=created_at.desc&limit=200"),
        api.get("erp_budgets", "&order=created_at.desc&limit=200"),
        api.get("erp_warehouses", "&order=created_at.desc&limit=200"),
        api.get("erp_sku", "&order=created_at.desc&limit=200"),
        api.get("erp_stock_levels", "&limit=200"),
        api.get("erp_stock_movements", "&order=created_at.desc&limit=200"),
        api.get("erp_work_orders", "&order=created_at.desc&limit=200"),
        api.get("erp_boms", "&order=created_at.desc&limit=200"),
        api.get("erp_mrp_plans", "&order=created_at.desc&limit=200"),
        api.get("erp_maintenance_orders", "&order=created_at.desc&limit=200"),
        api.get("erp_vendors", "&order=created_at.desc&limit=200"),
        api.get("erp_purchase_orders", "&order=created_at.desc&limit=200"),
        api.get("erp_receipts", "&order=created_at.desc&limit=200"),
        api.get("erp_shipments", "&order=created_at.desc&limit=200"),
        api.get("erp_employees", "&order=created_at.desc&limit=200"),
        api.get("erp_payroll_runs", "&order=created_at.desc&limit=200"),
        api.get("erp_attendance", "&order=created_at.desc&limit=200"),
        api.get("erp_time_off", "&order=created_at.desc&limit=200"),
        api.get("erp_projects", "&order=created_at.desc&limit=200"),
        api.get("erp_project_tasks", "&order=created_at.desc&limit=200"),
        api.get("erp_timesheets", "&order=created_at.desc&limit=200"),
        api.get("erp_milestones", "&order=created_at.desc&limit=200"),
      ]);
      const safe = x => Array.isArray(x) ? x : [];
      setData({
        journalEntries: safe(journalEntries), arInvoices: safe(arInvoices), apBills: safe(apBills),
        fixedAssets: safe(fixedAssets), budgets: safe(budgets),
        warehouses: safe(warehouses), skus: safe(skus), stockLevels: safe(stockLevels), stockMovements: safe(stockMovements),
        workOrders: safe(workOrders), boms: safe(boms), mrpPlans: safe(mrpPlans), maintenanceOrders: safe(maintenanceOrders),
        vendors: safe(vendors), purchaseOrders: safe(purchaseOrders), receipts: safe(receipts), shipments: safe(shipments),
        employees: safe(employees), payrollRuns: safe(payrollRuns), attendance: safe(attendance), timeOff: safe(timeOff),
        projects: safe(projects), projectTasks: safe(projectTasks), timesheets: safe(timesheets), milestones: safe(milestones),
      });
    } catch (e) { console.error("ERP load error", e); }
    setLoading(false);
  }, []);

  useEffect(() => { if (user) loadAll(); }, [user, loadAll]);

  const logout = () => { localStorage.removeItem("erp_user"); setUser(null); };

  const toggleSection = id => setOpenSections(s => ({ ...s, [id]: !s[id] }));

  const navTo = (viewId, sectionId) => {
    setView(viewId);
    setOpenSections(s => ({ ...s, [sectionId]: true }));
  };

  if (!user) return <Login onLogin={u => setUser(u)} />;

  const role = user.role || "admin";
  const initials = (user.name || "U").split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
  const now = new Date().toLocaleDateString("es-AR", { weekday: "short", day: "2-digit", month: "short", year: "numeric" });

  const renderView = () => {
    switch (view) {
      case "dashboard": return <Dashboard data={data} />;
      case "diario": return <DiarioView data={data} onReload={loadAll} />;
      case "ar": return <ARView data={data} onReload={loadAll} />;
      case "ap": return <APView data={data} onReload={loadAll} />;
      case "activos": return <FixedAssetsView data={data} onReload={loadAll} />;
      case "presupuestos": return <BudgetsView data={data} onReload={loadAll} />;
      case "skus": return <SKUView data={data} onReload={loadAll} />;
      case "almacenes": return <WarehousesView data={data} onReload={loadAll} />;
      case "stock": return <StockView data={data} onReload={loadAll} />;
      case "movimientos": return <MovementsView data={data} onReload={loadAll} />;
      case "work_orders": return <WorkOrdersView data={data} onReload={loadAll} />;
      case "boms": return <BOMsView data={data} onReload={loadAll} />;
      case "mrp": return <MRPView data={data} onReload={loadAll} />;
      case "mantenimiento": return <MaintenanceView data={data} onReload={loadAll} />;
      case "proveedores": return <VendorsView data={data} onReload={loadAll} />;
      case "purchase_orders": return <PurchaseOrdersView data={data} onReload={loadAll} />;
      case "recepciones": return <ReceiptsView data={data} onReload={loadAll} />;
      case "envios": return <ShipmentsView data={data} onReload={loadAll} />;
      case "empleados": return <EmployeesView data={data} onReload={loadAll} />;
      case "nomina": return <PayrollView data={data} onReload={loadAll} />;
      case "asistencia": return <AttendanceView data={data} onReload={loadAll} />;
      case "tiempo_libre": return <TimeOffView data={data} onReload={loadAll} />;
      case "proyectos": return <ProjectsView data={data} onReload={loadAll} />;
      case "tareas": return <TasksView data={data} onReload={loadAll} />;
      case "timesheets": return <TimesheetsView data={data} onReload={loadAll} />;
      case "hitos": return <MilestonesView data={data} onReload={loadAll} />;
      case "ia_dashboard": return <IAView data={data} />;
      default: return <Dashboard data={data} />;
    }
  };

  return (
    <div className="erp">
      {/* SIDEBAR */}
      <div className="sb">
        <div className="sb-logo">
          <div className="sb-logo-title">ERP <span>NORIVA</span></div>
          <div className="sb-logo-ver">Enterprise Resource Planning · v2.0</div>
        </div>

        <div className="sb-nv">
          {NAV.map(section => {
            if (!canAccess(role, section.module)) return null;
            const isOpen = openSections[section.id];
            const isActiveSec = section.items.some(i => i.id === view);
            return (
              <div key={section.id} className="sb-mod">
                <div className={`sb-mod-hd${isActiveSec ? " ac" : ""}`} onClick={() => toggleSection(section.id)}>
                  <span className="sb-mod-icon">{section.icon}</span>
                  <span className="sb-mod-label">{section.label}</span>
                  <span className={`sb-mod-arrow${isOpen ? " open" : ""}`}>▶</span>
                </div>
                <div className="sb-sub" style={{ maxHeight: isOpen ? section.items.length * 34 + "px" : "0px" }}>
                  {section.items.map(item => (
                    <button
                      key={item.id}
                      className={`sb-sub-it${view === item.id ? " ac" : ""}`}
                      onClick={() => navTo(item.id, section.id)}
                    >
                      <span>{item.label}</span>
                    </button>
                  ))}
                </div>
              </div>
            );
          })}
        </div>

        <div className="sb-ft">
          <div className="sb-av">{initials}</div>
          <div style={{ flex: 1, minWidth: 0 }} className="sb-ft-info">
            <div style={{ fontSize: 10, fontWeight: 700, color: "var(--tx)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{user.name}</div>
            <span className={`role-badge role-${role}`}>{role}</span>
          </div>
          <button className="btn btn-s btn-sm" onClick={logout} title="Cerrar sesión" style={{ flexShrink: 0 }}>⏻</button>
        </div>
      </div>

      {/* MAIN */}
      <div className="mn">
        <div className="tp">
          <h1>{VIEW_LABELS[view] || "ERP Noriva"}</h1>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            {loading && <span style={{ fontSize: 10, color: "var(--tx3)" }}>⟳ Cargando…</span>}
            <span className="tp-dt">{now}</span>
            <div className="sb-av" style={{ width: 28, height: 28 }}>{initials}</div>
            <a className="tp-back" href="index.html">← CRM</a>
          </div>
        </div>
        <div className="pg">
          {renderView()}
        </div>
      </div>
    </div>
  );
}
